$font = Monospace

general {
    hide_cursor = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
path = /home/vaseline/Pictures/Wallpapers/a_cartoon_of_a_girl_holding_a_glass_in_a_kitchen.png
    blur_passes = 2
    blur_size = 2
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    
    # SHARP EDGES
    rounding = 0 
    
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    
    outer_color = rgb(255, 255, 255)
    inner_color = rgba(0, 0, 0, 0.5) # Darker box for contrast
    font_color = rgb(255, 255, 255)
    
    fade_on_empty = false
    placeholder_text = <span foreground="white">Tsenya Password Mkhulu</span>
    hide_input = false
    
    position = 0, 0
    halign = center
    valign = center
}
