$mod = SUPER
$mainMod = SUPER
$editor = zeditor
$browser = zen-browser

# Application Shortcuts
bind = $mod, RETURN, exec, kitty
bind = $mod, E, exec, kitty -e lf
bind = $mod, B, exec, $browser
bind = $mod, L, exec, hyprlock
bind = $mod, W, exec, waypaper
bind = $mod, Z, exec, $editor
bind = $mod, X, exec, kitty
bind = $mod, D, exec, vicinae toggle

bind = $mod SHIFT, B, exec, ~/.config/hypr/scripts/toggle_waybar.sh
bind = $mod SHIFT, T, exec, ~/.config/hypr/scripts/toggle_theme.sh
bind = $mod SHIFT, C, exec, ~/.config/hypr/scripts/caffeine.sh 'toggle'
bind = $mod SHIFT, P, exec, ~/.config/hypr/scripts/phone_connect.sh


bind = $mod, F, fullscreen
bind = $mod, Q, killactive
bind = $mod, J, togglesplit
bind = $mod, P, pin 
bind = $mod, Tab, cyclenext
bind = $mod, Tab, bringactivetotop,
bind = $mod, V, exec, hyprctl dispatch togglefloating; hyprctl dispatch centerwindow
bind = $mod, semicolon, exec, vicinae vicinae://extensions/vicinae/clipboard/history


# Visual & Screenshot Controls
bind = , Print, exec, ~/.config/hypr/scripts/peck.sh --clipboard 


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec,  ~/.config/hypr/scripts/prgnotifier.sh 'volume up'
bindel = ,XF86AudioLowerVolume, exec,  ~/.config/hypr/scripts/prgnotifier.sh 'volume down'
bindel = ,XF86AudioMute, exec,  ~/.config/hypr/scripts/prgnotifier.sh 'volume toggle'
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec,  ~/.config/hypr/scripts/prgnotifier.sh 'light up'
bindel = ,XF86MonBrightnessDown, exec,  ~/.config/hypr/scripts/prgnotifier.sh 'light down'

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10


bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, code:10, workspace, 1
bind = $mod, code:11, workspace, 2
bind = $mod, code:12, workspace, 3
bind = $mod, code:13, workspace, 4
bind = $mod, code:14, workspace, 5
bind = $mod, code:15, workspace, 6
bind = $mod, code:16, workspace, 7
bind = $mod, code:17, workspace, 8
bind = $mod, code:18, workspace, 9
bind = $mod, code:19, workspace, 10

bind = $mod SHIFT, code:10, movetoworkspace, 1
bind = $mod SHIFT, code:11, movetoworkspace, 2
bind = $mod SHIFT, code:12, movetoworkspace, 3
bind = $mod SHIFT, code:13, movetoworkspace, 4
bind = $mod SHIFT, code:14, movetoworkspace, 5
bind = $mod SHIFT, code:15, movetoworkspace, 6
bind = $mod SHIFT, code:16, movetoworkspace, 7
bind = $mod SHIFT, code:17, movetoworkspace, 8
bind = $mod SHIFT, code:18, movetoworkspace, 9
bind = $mod SHIFT, code:19, movetoworkspace, 10

bind = $mod SHIFT, left, swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up, swapwindow, u
bind = $mod SHIFT, down, swapwindow, d

# Resize both width and height smaller
bind = $mod, minus, resizeactive, -100 0

# Resize both width and height bigger
bind = $mod, equal, resizeactive, 100 100

# Resize width only (shrink / grow)
bind = $mod SHIFT, minus, resizeactive, -100 0
bind = $mod SHIFT, equal, resizeactive, 100 0

# Resize height only (shrink / grow)
bind = $mod CTRL, minus, resizeactive, 0 -100
bind = $mod CTRL, equal, resizeactive, 0 100

