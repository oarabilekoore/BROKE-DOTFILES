# --- ENVIRONMENT ---
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_STYLE_OVERRIDE,kvantum

env = XCURSOR_SIZE,28
env = HYPRCURSOR_SIZE,28

# --- GENERAL ---
general {
    gaps_in = 8
    gaps_out = 12
    border_size = 1
    layout = scrolling
    resize_on_border = true
    allow_tearing = true
}

master {
    smart_resizing = true
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

decoration {
    rounding = 1
    rounding_power = 10

    # Opacity is the key to the "glass" look
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
        size = 2        # The "radius" of the blur (make it high for frosting)
        passes = 1      # How many times to filter. Keep this LOW (1 or 2) on Celeron!

        new_optimizations = true
        xray = true     # "See through" windows - actually faster to render!
        ignore_opacity = true
        noise = 0.05    # Adds a grainy texture (looks cool, hides low-res blur)
    }

    # Subtle shadows to pop the glass off the background
    shadow {
        enabled = true
        range = 15
        render_power = 2
        color = rgba(0,0,0,0.4)
    }
}

animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# --- MISC (System Tweaks) ---
misc {
    vfr = true                      # CRITICAL: Variable Frame Rate saves battery & CPU
    vrr = 0                         # Disable Variable Refresh Rate (overhead)
    disable_hyprland_logo = true    # Skip the anime girl logo at startup
    disable_splash_rendering = true
    animate_manual_resizes = false  # PERFORMANCE: Don't animate while dragging window edges
    animate_mouse_windowdragging = false
    background_color = 0x000000     # Force black background if wallpaper fails (saves rendering)
}
