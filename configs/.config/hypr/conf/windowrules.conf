windowrule {
  name = localsend
  match:class = ^(localsend)$
  float = on 
  center = on 
  size = 720 480
}

windowrule {
    name = brave-pop-up-sign-in-window
    match:title = ^(Sign in - Google Accounts|Google Accounts|Sign in|Login|Authorize.*)$
    match:class = ^(brave.*)$
    float = on
    size = 600 450
    center = on
    pin = on
}

windowrule {
    name = brave-file-picker
    # Match windows with "save" or "open" in the title
    match:title = ^(.*wants to save.*|Open File|Save File|Select Folder)$
    # Limit it to the browser class so it doesn't catch other apps
    match:class = ^(brave)$
    
    float = on
    size = 900 600
    center = on
    # Keep it above the main window
    pin = on
}
windowrule {
    name = brave-file-input-picker
    # Matches any title containing "wants to open" or "wants to save"
    match:title = ^(.*wants to (open|save).*)$
    
    # Ensures it only applies to Brave's dialogs
    match:initial_class = ^(brave)$

    float = on
    size = 900 600
    center = on
    
    # Keeps the picker on top of the browser
    pin = on
}

windowrule {
    name = small-file-picker
    match:class = ^(xdg-desktop-portal-gnome)$
    float = 1
    size = 800 600
    center = 1
    pin = on
}

windowrule {
  name = files
  match:class = ^(waypaper)$
  float = on 
  center = on 
  size = 1200 800
}

